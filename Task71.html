<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini E-Commerce Store</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.controls{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:25px;
}

input,select{
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
    min-width:220px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:10px;
    padding:15px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
    text-align:center;
}

.card img{
    width:100%;
    height:220px;
    object-fit:contain;
}

.card h3{
    font-size:16px;
    margin:10px 0;
}

.card p{
    margin:5px 0;
}

.card button{
    margin-top:10px;
    padding:10px 15px;
    border:none;
    background:#28a745;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

.card button:hover{
    background:#218838;
}

.cart-section{
    margin-top:40px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.cart-item{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
    border-bottom:1px solid #eee;
    padding-bottom:5px;
}

.total{
    margin-top:15px;
    font-size:20px;
    font-weight:bold;
}
</style>
</head>
<body>

<h1>🛒 Mini E-Commerce Store</h1>

<div class="controls">
    <input type="text" id="search" placeholder="Search Products">

    <select id="category">
        <option value="all">All Categories</option>
    </select>

    <select id="sort">
        <option value="">Sort By Price</option>
        <option value="low">Low → High</option>
        <option value="high">High → Low</option>
    </select>
</div>

<div class="products" id="products"></div>

<div class="cart-section">
    <h2>🛍 Cart</h2>
    <div id="cart"></div>
    <div class="total">
        Total: ₹<span id="total">0</span>
    </div>
</div>

<script>
const productsContainer = document.getElementById("products");
const categorySelect = document.getElementById("category");
const searchInput = document.getElementById("search");
const sortSelect = document.getElementById("sort");
const cartContainer = document.getElementById("cart");
const totalElement = document.getElementById("total");

let products = [];
let cart = [];

// Fetch Products
async function getProducts(){
    const response = await fetch(
        "https://fakestoreapi.com/products"
    );

    products = await response.json();

    displayProducts(products);
    loadCategories();
}

getProducts();

// Display Products
function displayProducts(data){

    productsContainer.innerHTML = "";

    data.forEach(product=>{

        productsContainer.innerHTML += `
        <div class="card">
            <img src="${product.image}">
            <h3>${product.title}</h3>
            <p><strong>₹${Math.floor(product.price * 80)}</strong></p>
            <p>${product.category}</p>

            <button onclick="addToCart(${product.id})">
                Add To Cart
            </button>
        </div>
        `;
    });
}

// Load Categories
function loadCategories(){

    const categories = [
        ...new Set(products.map(p=>p.category))
    ];

    categories.forEach(cat=>{

        categorySelect.innerHTML += `
        <option value="${cat}">
            ${cat}
        </option>
        `;
    });
}

// Filter + Search + Sort
function applyFilters(){

    let filteredProducts = [...products];

    // Category Filter
    if(categorySelect.value !== "all"){
        filteredProducts = filteredProducts.filter(
            product =>
            product.category === categorySelect.value
        );
    }

    // Search
    filteredProducts = filteredProducts.filter(
        product =>
        product.title.toLowerCase().includes(
            searchInput.value.toLowerCase()
        )
    );

    // Sort
    if(sortSelect.value === "low"){
        filteredProducts.sort(
            (a,b)=>a.price-b.price
        );
    }

    if(sortSelect.value === "high"){
        filteredProducts.sort(
            (a,b)=>b.price-a.price
        );
    }

    displayProducts(filteredProducts);
}

categorySelect.addEventListener(
    "change",
    applyFilters
);

searchInput.addEventListener(
    "input",
    applyFilters
);

sortSelect.addEventListener(
    "change",
    applyFilters
);

// Add To Cart
function addToCart(id){

    const product = products.find(
        item => item.id === id
    );

    cart.push(product);

    renderCart();
}

//  Cart
function renderCart(){

    cartContainer.innerHTML = "";

    cart.forEach(item=>{

        cartContainer.innerHTML += `
        <div class="cart-item">
            <span>${item.title}</span>
            <span>
                ₹${Math.floor(item.price * 80)}
            </span>
        </div>
        `;
    });

    calculateTotal();
}

// Total Calculation
function calculateTotal(){

    const total = cart.reduce(
        (sum,item)=>
        sum + Math.floor(item.price * 80),
        0
    );

    totalElement.textContent = total;
}
</script>

</body>
</html>
